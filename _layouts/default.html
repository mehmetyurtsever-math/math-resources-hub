<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">📚 {{ site.title }}</a>
      <div class="site-search">
        <input id="site-search-input" type="search" placeholder="Search topics…" aria-label="Search navigation links" autocomplete="off">
        <button id="site-search-clear" type="button" aria-label="Clear search">✕</button>
      </div>
      <nav id="site-nav" class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/topics/' | relative_url }}">Topics</a>
        <a href="{{ '/recommended-links/' | relative_url }}" data-keywords="recommended links önerilen bağlantılar kaynaklar resources">Recommended Links</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-groups">
        <div class="footer-group">
          <p class="footer-group-label">Core</p>
          <ul class="footer-nav">
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li><a href="{{ '/topics/' | relative_url }}">Topics</a></li>
            <li><a href="{{ '/recommended-links/' | relative_url }}">Recommended Links</a></li>
          </ul>
        </div>
      </div>
      <p class="footer-copyright">© {{ site.title }} — Math resources for undergraduate students</p>
    </div>
  </footer>
  <script>
    (function () {
      var input = document.getElementById('site-search-input');
      var clearBtn = document.getElementById('site-search-clear');
      var nav = document.getElementById('site-nav');
      var links = nav ? Array.from(nav.querySelectorAll('a')) : [];

      function normalize(str) {
        return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLocaleLowerCase('tr-TR');
      }

      function applyFilter() {
        var query = normalize(input.value.trim());
        clearBtn.style.display = query ? 'inline-flex' : 'none';
        var anyVisible = false;
        links.forEach(function (a) {
          var label = normalize(a.textContent);
          var keywords = normalize(a.getAttribute('data-keywords') || '');
          var haystack = label + ' ' + keywords;
          if (!query || haystack.indexOf(query) !== -1) {
            a.style.display = '';
            anyVisible = true;
          } else {
            a.style.display = 'none';
          }
        });
        nav.classList.toggle('is-empty', query.length > 0 && !anyVisible);
      }

      input.addEventListener('input', applyFilter);

      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          var q = input.value.trim();
          if (q) {
            window.location.href = '{{ "/search/" | relative_url }}?q=' + encodeURIComponent(q);
          }
        }
      });

      clearBtn.addEventListener('click', function () {
        input.value = '';
        applyFilter();
        input.focus();
      });

      clearBtn.style.display = 'none';
    })();
  </script>
</body>
</html>
